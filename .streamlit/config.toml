[theme]
base = "dark"

# Stockpeers-inspired dark dashboard surface
backgroundColor = "#1a1b1f"
secondaryBackgroundColor = "#484a50"
textColor = "#ffffff"

# Cavs accent, kept as a small highlight instead of a loud background
primaryColor = "#d3b97f"

# Native Streamlit polish
showWidgetBorder = true
borderColor = "#4b4d50"
dataframeHeaderBackgroundColor = "#1d293d"

# Clean, minimalist typography similar to demo-stockpeers
font = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
baseFontWeight = 300
baseFontSize = 14
headingFont = "Space Grotesk"
headingFontWeights = [300, 400, 400, 300, 300, 300]
headingFontSizes = ["2.5rem", "1.5rem", "1rem"]
